<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.10" />
      <stop offset="0.55" stop-color="white" stop-opacity="0.03" />
      <stop offset="1" stop-color="white" stop-opacity="0.08" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.4" />
    </filter>
  </defs>

  <!-- Gentle arcs / routes -->
  <path d="M80 520 C 240 420, 360 560, 520 470 S 860 330, 1120 420" stroke="url(#line)" stroke-width="1" />
  <path d="M120 210 C 300 120, 430 260, 600 180 S 900 60, 1140 140" stroke="url(#line)" stroke-width="1" />
  <path d="M60 360 C 220 300, 360 430, 520 360 S 860 240, 1180 300" stroke="url(#line)" stroke-width="1" />

  <!-- Nodes -->
  <g filter="url(#soft)">
    <circle cx="120" cy="210" r="6" fill="white" fill-opacity="0.14" />
    <circle cx="320" cy="140" r="4" fill="white" fill-opacity="0.12" />
    <circle cx="520" cy="180" r="5" fill="white" fill-opacity="0.13" />
    <circle cx="740" cy="120" r="4" fill="white" fill-opacity="0.12" />
    <circle cx="980" cy="80" r="6" fill="white" fill-opacity="0.14" />

    <circle cx="80" cy="520" r="6" fill="white" fill-opacity="0.14" />
    <circle cx="280" cy="450" r="4" fill="white" fill-opacity="0.12" />
    <circle cx="520" cy="470" r="5" fill="white" fill-opacity="0.13" />
    <circle cx="820" cy="360" r="4" fill="white" fill-opacity="0.12" />
    <circle cx="1120" cy="420" r="6" fill="white" fill-opacity="0.14" />

    <circle cx="60" cy="360" r="5" fill="white" fill-opacity="0.13" />
    <circle cx="320" cy="320" r="4" fill="white" fill-opacity="0.12" />
    <circle cx="520" cy="360" r="5" fill="white" fill-opacity="0.13" />
    <circle cx="820" cy="260" r="4" fill="white" fill-opacity="0.12" />
    <circle cx="1180" cy="300" r="5" fill="white" fill-opacity="0.13" />
  </g>

  <!-- Light connectors -->
  <g stroke="white" stroke-opacity="0.07" stroke-width="1">
    <path d="M120 210 L 320 140 L 520 180 L 740 120 L 980 80" />
    <path d="M80 520 L 280 450 L 520 470 L 820 360 L 1120 420" />
    <path d="M60 360 L 320 320 L 520 360 L 820 260 L 1180 300" />
  </g>
</svg>
